name: Build & Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot 4.6
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz
          unzip -q Godot_v4.6-stable_linux.x86_64.zip
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          unzip -q Godot_v4.6-stable_export_templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/4.6.stable/

      - name: Import project
        run: |
          set -o pipefail
          ./Godot_v4.6-stable_linux.x86_64 --headless --path . --import 2>&1 | tee /tmp/import.log
          if grep -qE "SCRIPT ERROR|ERROR:|Failed to load script|Parse Error|Compile Error" /tmp/import.log; then
            echo "::error::Godot import errors detected"
            grep -B1 -A3 -E "SCRIPT ERROR|ERROR:|Failed to load script|Parse Error|Compile Error" /tmp/import.log | head -80
            exit 1
          fi

      - name: Smoke test all synchronized maps
        run: bash tools/smoke_maps.sh ./Godot_v4.6-stable_linux.x86_64

      - name: Export Web
        run: |
          mkdir -p build/web
          ./Godot_v4.6-stable_linux.x86_64 --headless --path . --export-release "Web" build/web/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          force_orphan: true
